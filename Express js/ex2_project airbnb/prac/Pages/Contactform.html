<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Contact form</title>

    <style>
      body {
        margin: 0;
        background: #f8f3ff;
        font-family:
          Segoe UI,
          sans-serif;
      }

      .container {
        width: 450px;
        margin: 60px auto;
        background: white;
        padding: 35px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(106, 17, 203, 0.2);
      }

      h1 {
        text-align: center;
        color: #6a11cb;
        margin-bottom: 25px;
      }

      label {
        font-weight: bold;
        color: #444;
      }

      input {
        width: 100%;
        padding: 12px;
        margin: 10px 0 20px;
        border: 2px solid #ddd;
        border-radius: 8px;
        outline: none;
      }

      input:focus {
        border-color: #6a11cb;
      }

      input[type="submit"] {
        background: #6a11cb;
        color: white;
        font-size: 16px;
        border: none;
        cursor: pointer;
      }

      input[type="submit"]:hover {
        background: #4c0ea3;
      }

      .home {
        display: block;
        text-align: center;
        margin-top: 20px;
        text-decoration: none;
        color: #6a11cb;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Register Your Home</h1>

      <form action="/host/add-home" method="POST">
        <label>Your Name</label>
        <input type="text" name="name" placeholder="Enter your name" required />

        <label>Email Address</label>
        <input
          type="email"
          name="email"
          placeholder="Enter your email"
          required
        />

        <input type="submit" value="Submit" />
      </form>

      <a href="/" class="home">⬅ Back to Home</a>
    </div>
  </body>
</html>
