<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dream Homes</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Verdana, Geneva, Tahoma, sans-serif;
      }

      body {
        background: linear-gradient(135deg, #6a11cb, #2575fc);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .container {
        width: 500px;
        background: white;
        padding: 40px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
      }

      h1 {
        color: #6a11cb;
        margin-bottom: 20px;
      }

      p {
        color: #555;
        line-height: 1.7;
        margin-bottom: 30px;
      }

      .btn {
        display: inline-block;
        text-decoration: none;
        background: #6a11cb;
        color: white;
        padding: 14px 35px;
        border-radius: 30px;
        transition: 0.3s;
      }

      .btn:hover {
        background: #4c0ea3;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🏡 Dream Homes</h1>

      <p>
        Find and register your dream home in just a few clicks. Start your
        journey with us today.
      </p>
      <h1 class="text-5xl font-bold text-blue-500 text-center mt-20">
        Hello Tailwind
      </h1>

      <a href="/contact_us" class="btn"> contact Form </a>
    </div>
  </body>
</html>
