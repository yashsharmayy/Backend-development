<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>404 Not Found</title>

    <style>
      body {
        margin: 0;
        background: #1e293b;
        color: white;
        font-family: Arial;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .container {
        text-align: center;
      }

      h1 {
        font-size: 110px;
        color: #ff4d4d;
        margin-bottom: 10px;
      }

      h2 {
        margin-bottom: 20px;
      }

      p {
        color: #ddd;
      }

      a {
        display: inline-block;
        margin-top: 30px;
        background: #0d6efd;
        color: white;
        padding: 12px 28px;
        text-decoration: none;
        border-radius: 5px;
      }

      a:hover {
        background: #084298;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>404</h1>

      <h2>Page Not Found</h2>

      <p>The page you are looking for does not exist.</p>

      <a href="/">Return Home</a>
    </div>
  </body>
</html>
