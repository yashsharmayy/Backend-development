<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: #f4f4f4;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .container {
        background: #fff;
        width: 500px;
        padding: 40px;
        text-align: center;
        border-radius: 10px;
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
      }

      h1 {
        color: #0d6efd;
        margin-bottom: 20px;
      }

      p {
        margin: 20px 0;
        color: #555;
        line-height: 1.6;
      }

      a {
        text-decoration: none;
      }

      .btn {
        display: inline-block;
        background: #0d6efd;
        color: white;
        padding: 12px 30px;
        border-radius: 6px;
      }

      .btn:hover {
        background: #084298;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🏠 Welcome to My Website</h1>

      <p>Register your home quickly using our simple form.</p>

      <a href="/host/add-home" class="btn"> Add Home </a>
    </div>
  </body>
</html>
