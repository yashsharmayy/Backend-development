<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Success</title>

    <style>
      body {
        background: #e8f5e9;
        font-family: Arial;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .card {
        background: white;
        width: 500px;
        text-align: center;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.15);
      }

      h1 {
        color: #198754;
        margin-bottom: 20px;
      }

      a {
        display: inline-block;
        margin-top: 20px;
        padding: 12px 30px;
        background: #198754;
        color: white;
        text-decoration: none;
        border-radius: 5px;
      }

      a:hover {
        background: #146c43;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>✅ Home Registered Successfully!</h1>

      <p>Your information has been submitted successfully.</p>

      <a href="/">Go to Home</a>
    </div>
  </body>
</html>
