<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Add Home</title>

    <style>
      body {
        font-family: Arial;
        background: #eef2ff;
      }

      .container {
        width: 450px;
        margin: 60px auto;
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.15);
      }

      h1 {
        text-align: center;
        color: #0d6efd;
      }

      label {
        display: block;
        margin-top: 18px;
        font-weight: bold;
      }

      input {
        width: 100%;
        padding: 12px;
        margin-top: 8px;
        border: 1px solid #ccc;
        border-radius: 5px;
      }

      input[type="submit"] {
        margin-top: 25px;
        background: #0d6efd;
        color: white;
        border: none;
        cursor: pointer;
      }

      input[type="submit"]:hover {
        background: #084298;
      }

      a {
        display: block;
        text-align: center;
        margin-top: 20px;
        text-decoration: none;
        color: #0d6efd;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Register Your Home</h1>

      <form action="/host/add-home" method="POST">
        <label>Name</label>
        <input type="text" name="name" required />

        <label>Email</label>
        <input type="email" name="email" required />

        <input type="submit" value="Register" />
      </form>

      <a href="/">← Back to Home</a>
    </div>
  </body>
</html>
