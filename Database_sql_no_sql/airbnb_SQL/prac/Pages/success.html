<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Success</title>

    <style>
      body {
        margin: 0;
        background: linear-gradient(120deg, #00c853, #64dd17);
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .card {
        background: white;
        width: 500px;
        padding: 45px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.25);
      }

      .icon {
        font-size: 70px;
      }

      h1 {
        color: #00a152;
        margin: 20px 0;
      }

      p {
        color: #555;
        margin-bottom: 30px;
        line-height: 1.6;
      }

      a {
        text-decoration: none;
        background: #00a152;
        color: white;
        padding: 14px 35px;
        border-radius: 30px;
        display: inline-block;
        transition: 0.3s;
      }

      a:hover {
        background: #007d3d;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">🎉</div>

      <h1>Registration Complete!</h1>

      <p>
        Congratulations! Your home has been successfully registered in our
        system. We appreciate your trust and look forward to serving you.
      </p>

      <a href="/">Return to Home</a>
    </div>
  </body>
</html>
