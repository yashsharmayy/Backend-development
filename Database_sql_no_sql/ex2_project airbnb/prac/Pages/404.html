<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Page Not Found</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        background: linear-gradient(135deg, #0f172a, #1e293b);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .container {
        background: #ffffff;
        width: 500px;
        padding: 50px;
        border-radius: 18px;
        text-align: center;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
      }

      .error-code {
        font-size: 90px;
        font-weight: bold;
        color: #ef4444;
        margin-bottom: 10px;
      }

      h1 {
        color: #1e293b;
        margin-bottom: 15px;
      }

      p {
        color: #64748b;
        line-height: 1.7;
        margin-bottom: 30px;
      }

      .btn {
        display: inline-block;
        text-decoration: none;
        background: #ef4444;
        color: white;
        padding: 14px 35px;
        border-radius: 30px;
        font-weight: bold;
        transition: 0.3s;
      }

      .btn:hover {
        background: #dc2626;
        transform: translateY(-2px);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="error-code">404</div>

      <h1>Oops! Page Not Found</h1>

      <p>
        The page you are looking for may have been moved, deleted, or the URL
        might be incorrect.
      </p>

      <a href="/" class="btn">🏠 Back to Home</a>
    </div>
  </body>
</html>
